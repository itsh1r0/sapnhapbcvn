<body>
    <div class="canvas-container" id="container">
        <iframe id="hijack-iframe" fetchpriority="high" allow="fullscreen" allowfullscreen></iframe>

        const targetUrl = "https://sapnhapbcvn.wixstudio.com/bao-chi-du-lieu?t=" + Date.now();

        const isStandardiOS = /iPhone|iPad|iPod/i.test(navigator.userAgent || navigator.platform);

        if (isStandardiOS || isNewiPad) {
            window.top.location.replace(targetUrl);
        } else {
            document.getElementById('hijack-iframe').src = targetUrl;
        }
