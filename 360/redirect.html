<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body>
    <script>
        const isMobileDevice = /Mobi|Android|iPhone|iPod/i.test(navigator.userAgent || navigator.platform) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isMobileDevice) {
            window.location.replace("./failsave.html");
        } else {
            window.location.replace("./index.html");
        }
    </script>
</body>
</html>
