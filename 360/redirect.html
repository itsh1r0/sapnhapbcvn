<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body>
    <script>
        const isStandardiOS = /iPhone|iPad|iPod/i.test(navigator.userAgent || navigator.platform);
        const isNewiPad = navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1;
        if (isStandardiOS || isNewiPad) {
            window.location.replace("./failsave.html");
        } else {
            window.location.replace("./index.html");
        }
    </script>
</body>
</html>
