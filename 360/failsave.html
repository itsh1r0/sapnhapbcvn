<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 16px;
            font-family: 'Quicksand', sans-serif;
            background-color: transparent; /* Nền trong suốt để dễ nhúng */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Khung chứa tối ưu cho 360px */
        .failsafe-card {
            width: 100%;
            max-width: 328px;
            background-color: #ffffff; /* Giữ card màu trắng để nổi bật trên nền trong suốt */
            border: 1.5px solid #eef0f3;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }

        /* Thông báo A */
        .message-a {
            font-size: 15px;
            line-height: 1.6;
            color: #2d3748;
            margin-bottom: 20px;
            font-weight: 600; /* Tăng độ dày chữ để dễ đọc */
            word-wrap: break-word;
        }

        /* Nút Link B */
        .btn-b {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: #0071e3;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 700; /* Để chữ trên nút đậm rõ ràng */
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 113, 227, 0.25);
            transition: background-color 0.15s, transform 0.1s;
        }

        /* Hiệu ứng khi bấm giữ nút trên điện thoại */
        .btn-b:active {
            background-color: #005bb5;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="failsafe-card">
        <div class="message-a">
            Hệ thống phát hiện bạn đang sử dụng thiết bị chưa được tối ưu. Vui lòng chuyển hướng để có trải nghiệm tốt nhất.
        </div>
        
        <a href="https://itsh1r0.github.io/sapnhapbcvn/360" target="_blank" rel="noopener noreferrer" class="btn-b">
            Tiếp tục truy cập
        </a>
    </div>

</body>
</html>
