<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ đồ chuyển đổi Tòa soạn Hội tụ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            text-align: center;
            background-color: white;
            margin: 0;
            padding: 0;
        }
        button {
            font-family: inherit;
            padding: 15px 30px;
            font-size: 24px;
            margin: 20px;
            cursor: pointer;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        button::before {
            content: "⇒";
            display: inline-block;
            margin-right: 8px;
            animation: bounce 0.6s infinite alternate;
        }
        button::after {
            content: "⇐";
            display: inline-block;
            margin-left: 8px;
            animation: bounce-alt 0.6s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateX(-5px); }
            to { transform: translateX(5px); }
        }
        @keyframes bounce-alt {
            from { transform: translateX(5px); }
            to { transform: translateX(-5px); }
        }
        button:hover {
            background-color: #004494;
            transform: scale(1.1);
        }
        .node text {
            font-size: 14px;
            font-weight: bold;
            text-anchor: middle;
            fill: #333;
        }
        .node rect {
            stroke: #333;
            stroke-width: 1px;
            rx: 8px;
            ry: 8px;
        }
        .link {
            fill: none;
            stroke: #999;
            stroke-width: 4px;
        }
    </style>
</head>
<body>

    <button id="toggleBtn">Chuyển sang Mô hình mới (Hội tụ)</button>
    <div id="chart"></div>

    <script>
        // Kích thước SVG
        const width = 1000;
        const height = 500;

        // Khởi tạo vùng vẽ SVG
        const svg = d3.select("#chart")
            .append("svg")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("preserveAspectRatio", "xMidYMid meet")
            .style("width", "100%")
            .style("height", "auto");

        // Dữ liệu mô hình: gom chung cũ và mới để dễ quản lý
        const models = {
            old: {
                nodes: [
                    { id: "Báo", x: 250, y: 150, color: "#ccffff" },
                    { id: "Báo in", x: 150, y: 400, color: "#66b3ff" },
                    { id: "Báo điện tử", x: 350, y: 400, color: "#66b3ff" },
                    { id: "Đài PTTH", x: 750, y: 150, color: "#ccffff" },
                    { id: "Phát thanh", x: 650, y: 400, color: "#66b3ff" },
                    { id: "Truyền hình", x: 850, y: 400, color: "#66b3ff" }
                ],
                links: [
                    { source: "Báo", target: "Báo in" },
                    { source: "Báo", target: "Báo điện tử" },
                    { source: "Đài PTTH", target: "Phát thanh" },
                    { source: "Đài PTTH", target: "Truyền hình" }
                ],
                btnText: "Chuyển sang Mô hình mới (Hội tụ)"
            },
            new: {
                nodes: [
                    { id: "Báo", text: "Báo và Phát thanh, Truyền hình", x: 500, y: 150, color: "#ccffff", width: 280 },
                    { id: "Báo in", x: 200, y: 400, color: "#66b3ff" },
                    { id: "Báo điện tử", x: 400, y: 400, color: "#66b3ff" },
                    { id: "Đài PTTH", text: "Báo và Phát thanh, Truyền hình", x: 500, y: 150, color: "#ccffff", width: 280 },
                    { id: "Phát thanh", x: 600, y: 400, color: "#66b3ff" },
                    { id: "Truyền hình", x: 800, y: 400, color: "#66b3ff" }
                ],
                links: [
                    { source: "Báo", target: "Báo in" },
                    { source: "Báo", target: "Báo điện tử" },
                    { source: "Đài PTTH", target: "Phát thanh" },
                    { source: "Đài PTTH", target: "Truyền hình" }
                ],
                btnText: "Quay lại Mô hình cũ (Độc lập)"
            }
        };

        // Trạng thái hiện tại
        let isOldModel = true;
        let currentNodes = models.old.nodes;

        // Tạo nhóm cho links và nodes để quản lý z-index
        const linkGroup = svg.append("g").attr("class", "links");
        const nodeGroup = svg.append("g").attr("class", "nodes");

        // Hàm tiện ích: Lấy node theo ID
        const getNode = (nodes, id) => nodes.find(n => n.id === id);

        // Hàm vẽ và cập nhật biểu đồ
        function draw(modelData, isInit = false) {
            const { nodes, links } = modelData;
            
            const durFade = isInit ? 0 : 100;
            const durMove = isInit ? 0 : 1500;
            const delMove = isInit ? 0 : 100;

            const link = linkGroup.selectAll("line")
                .data(links, d => `${d.source}-${d.target}`);

            link.exit()
                .transition()
                .duration(durFade)
                .style("opacity", 0)
                .remove();

            const linkEnter = link.enter()
                .append("line")
                .attr("class", "link")
                .style("opacity", isInit ? 1 : 0)
                .attr("x1", d => getNode(nodes, d.source).x)
                .attr("y1", d => getNode(nodes, d.source).y)
                .attr("x2", d => getNode(nodes, d.target).x)
                .attr("y2", d => getNode(nodes, d.target).y);

            linkEnter.merge(link)
                .transition()
                .duration(durFade)
                .style("opacity", isInit ? 1 : 0)
                .transition()
                .duration(durMove)
                .attr("x1", d => getNode(nodes, d.source).x)
                .attr("y1", d => getNode(nodes, d.source).y)
                .attr("x2", d => getNode(nodes, d.target).x)
                .attr("y2", d => getNode(nodes, d.target).y)
                .transition()
                .duration(durFade)
                .style("opacity", 1);

            const node = nodeGroup.selectAll("g.node")
                .data(nodes, d => d.id);

            const nodeEnter = node.enter()
                .append("g")
                .attr("class", "node")
                .attr("transform", d => `translate(${d.x},${d.y})`);

            nodeEnter.append("rect")
                .attr("width", d => d.width || 150)
                .attr("height", 40)
                .attr("x", d => -(d.width || 150) / 2)
                .attr("y", -20)
                .attr("rx", 8)
                .attr("ry", 8)
                .attr("fill", d => d.color);

            nodeEnter.append("text")
                .attr("dy", 5)
                .text(d => d.id);

            node.transition()
                .delay(delMove)
                .duration(durMove)
                .attr("transform", d => `translate(${d.x},${d.y})`)
                .select("rect")
                .attr("width", d => d.width || 150)
                .attr("x", d => -(d.width || 150) / 2)
                .attr("fill", d => d.color);
            
            node.select("text")
                .transition()
                .delay(delMove)
                .duration(durMove)
                .text(d => d.text || d.id);
            
            currentNodes = nodes;
        }

        // Vẽ trạng thái ban đầu
        draw(models.old, true);

        // Lắng nghe sự kiện bấm nút chuyển đổi
        d3.select("#toggleBtn").on("click", function() {
            isOldModel = !isOldModel;
            const model = isOldModel ? models.old : models.new;
            draw(model, false);
            d3.select(this).text(model.btnText);
        });

    </script>
</body>
</html>
